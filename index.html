<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bug 冲刺 H5 — 引擎对比</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#fff;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;min-height:100vh}

.hero{text-align:center;margin-bottom:52px}
.hero h1{font-size:clamp(28px,6vw,52px);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#facc15 0%,#f97316 60%,#ef4444 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:14px}
.hero p{font-size:clamp(14px,2.5vw,18px);color:rgba(255,255,255,.55);letter-spacing:.02em}

.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;padding:0 24px}

.card{position:relative;width:clamp(260px,38vw,320px);border-radius:24px;overflow:hidden;cursor:pointer;text-decoration:none;display:block;transition:transform .2s ease,box-shadow .2s ease}
.card:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,.5)}
.card:active{transform:translateY(-2px)}

.card-inner{padding:36px 32px 32px;background:linear-gradient(160deg,rgba(255,255,255,.07) 0%,rgba(255,255,255,.02) 100%);border:1px solid rgba(255,255,255,.1)}

.badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:20px}
.card-cocos .badge{background:rgba(37,99,235,.25);color:#93c5fd;border:1px solid rgba(37,99,235,.4)}
.card-laya .badge{background:rgba(5,150,105,.25);color:#6ee7b7;border:1px solid rgba(5,150,105,.4)}

.card-icon{font-size:52px;margin-bottom:16px;line-height:1}
.card h2{font-size:22px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.card p{font-size:14px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:28px}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 0;border-radius:14px;font-size:15px;font-weight:600;transition:filter .15s}
.card:hover .btn{filter:brightness(1.1)}
.card-cocos .btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 4px 20px rgba(37,99,235,.4)}
.card-laya .btn{background:linear-gradient(135deg,#059669,#047857);color:#fff;box-shadow:0 4px 20px rgba(5,150,105,.4)}

.btn-arrow{font-size:18px;transition:transform .2s}
.card:hover .btn-arrow{transform:translateX(4px)}

.footer{margin-top:52px;font-size:12px;color:rgba(255,255,255,.25);text-align:center}

/* bg dots */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
body::after{content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse at top,rgba(59,130,246,.15),transparent 70%);pointer-events:none}
</style>
</head>
<body>
<div class="hero">
  <h1>Bug 冲刺 H5</h1>
  <p>同一款游戏，两个引擎，选一个开始玩</p>
</div>

<div class="cards">
  <a class="card card-cocos" href="cocos-creator-3.8/build/web-mobile/index.html">
    <div class="card-inner">
      <div class="badge">Cocos Creator 3.8</div>
      <div class="card-icon">🎮</div>
      <h2>Cocos 版本</h2>
      <p>基于 Cocos Creator 3.8 构建的 Web Mobile 版本</p>
      <div class="btn">立即游玩 <span class="btn-arrow">→</span></div>
    </div>
  </a>

  <a class="card card-laya" href="layaair-3.x/bin/scene-test.html">
    <div class="card-inner">
      <div class="badge">LayaAir 3.x</div>
      <div class="card-icon">⚡</div>
      <h2>LayaAir 版本</h2>
      <p>基于 LayaAir 3.x 构建的 Web 版本</p>
      <div class="btn">立即游玩 <span class="btn-arrow">→</span></div>
    </div>
  </a>
</div>

<div class="footer">躲开 Bug，收集咖啡，今晚先把 Demo 跑通</div>
</body>
</html>
